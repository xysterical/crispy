<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #0b0f0d;
        color: #eef6f1;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .viewer {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .bar {
        padding: 10px 14px 10px 82px;
        border-bottom: 1px solid rgba(255,255,255,0.12);
        font-size: 13px;
        color: #b8c8c0;
        overflow-wrap: anywhere;
      }
      .close-btn {
        position: fixed;
        top: 10px;
        left: 12px;
        z-index: 2;
        padding: 6px 10px;
        border: 1px solid rgba(255,255,255,0.24);
        border-radius: 8px;
        background: rgba(255,255,255,0.08);
        color: #eef6f1;
        font-size: 13px;
        cursor: pointer;
      }
      .close-btn:hover { background: rgba(255,255,255,0.16); }
      .stage {
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
        box-sizing: border-box;
      }
      .viewer-media {
        max-width: calc(100vw - 28px);
        max-height: calc(100vh - 62px);
        object-fit: contain;
        background: #050807;
      }
      .viewer-media.image {
        width: auto;
        height: auto;
      }
      .viewer-media.video {
        width: auto;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="viewer">
      <button class="close-btn" type="button" onclick="leaveViewer()">Close</button>
      <div class="bar">{{ title }}</div>
      <div class="stage" onclick="if (event.target === this) leaveViewer()">{{ body | safe }}</div>
    </main>
    <script>
      function leaveViewer() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.close();
          setTimeout(() => { window.location.href = "/dashboard"; }, 100);
        }
      }
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") leaveViewer();
      });
    </script>
  </body>
</html>
